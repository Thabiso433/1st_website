<!Doctype html>
<html lang="en">

<head>
    <title>Ubuntu-realState</title>
    <link rel="stylesheet" href="style.css" />
</head>

<body>
    <!-- Log in section -->
    <section id="auth-sec" class="auth-container">
        <div class="auth-card">
            <h1 class="logo">Ubuntu</h1>
            <p class="subtitle">Get your Dream home today</p>

            <!-- My toggle tabs -->
            <div class="auth-tab">
                <button id="tab-login" class="tab-btn" onclick="switchAuthTab('login')">Login</button>
                <button id="tab-register" class="tab-btn" onclick="switchAuthTab('register')">Register</button>
            </div>

            <!-- My Login Form -->
            <form id="log-form" class="auth-form">
                <div class="input-group">
                    <label for="login-email">Email Address</label>
                    <input type="email" id="login-email" placeholder="example@gmail.com" require />
                </div>
                <div class="input-group">
                    <label for="login-password">Password</label>
                    <input type="password" id="login-password" placeholder=" .............." require />
                </div>
                <button type="submit" class="btn-primary">Log In</button>
            </form>

            <!-- My registering from -->

            <form id="reg-form" class="auth-form hidden">
                <div class="input-group">
                    <label for="reg-name">Full Name</label>
                    <input type="text" id="reg-name" placeholder="e.g Thabiso Mahlothe" />
                </div>
                <div class="input-group">
                    <label for="reg-email">Email address</label>
                    <input type="email" id="reg-email" placeholder="example@gmail.com" required />
                </div>

                <div class="input-group">
                    <label for="reg-password">Password</label>
                    <input type="password" id="reg-password" placeholder="........." required />
                </div>
                <button type="submit" class="btn-primary">Create Account</button>
            </form>
        </div>
    </section>

    <!-- Hidden web(appears after login succsseful or register) -->
<div id = "main-web" class = "hidden">
    <nav class = "navbar">
        <div class ="nav-brand">Ubuntu Quality homes</div>
        <div class = "nav-user">
            <span id = "Display">Welcome,Guest </span>
            <button id = "logout-btn" class = "btn-outline">Log Out</button>
        </div>
    </nav>
    <main class = "dashboard">
        <header class = "dashboard-header">
            <h2>featured Proparties</h2>
            <p>Explore luxury listings and contact our top agents directly</p>
        </header>
        <section id = "property-grid" class="property-grid"></section>
    </main>
</div>
<script src = "javaScript.js"></script>
</body>
</html>
